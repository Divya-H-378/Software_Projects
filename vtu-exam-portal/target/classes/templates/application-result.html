<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Receipt - VTU Prexam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container d-flex justify-content-center">
            <span class="navbar-brand fw-bold text-white">🎓 VTU Prexam Portal</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="vtu-card text-center">
                    <div class="fs-1 text-success mb-2">✓</div>
                    <h2 class="fw-bold mb-1" style="color: var(--vtu-navy);">Application Received</h2>
                    <p class="text-secondary small mb-4">Your exam application details have been submitted successfully.</p>

                    <!-- Receipt Details Box (No prices/fees) -->
                    <div class="text-start p-4 rounded bg-light mb-4 border">
                        <div class="d-flex justify-content-between py-2 border-bottom">
                            <span class="text-secondary small">Reference ID:</span>
                            <strong class="text-primary" th:text="'#VTU-' + ${app.id}"></strong>
                        </div>
                        <div class="d-flex justify-content-between py-2 border-bottom">
                            <span class="text-secondary small">Student USN:</span>
                            <span class="fw-semibold" th:text="${app.usn}"></span>
                        </div>
                        <div class="d-flex justify-content-between py-2 border-bottom">
                            <span class="text-secondary small">Student Name:</span>
                            <span class="fw-semibold" th:text="${app.studentName}"></span>
                        </div>
                        <div class="d-flex justify-content-between py-2 border-bottom">
                            <span class="text-secondary small">Applied Date:</span>
                            <span class="fw-semibold" th:text="${#dates.format(app.appliedDate, 'dd-MMM-yyyy HH:mm')}"></span>
                        </div>
                        <div class="d-flex justify-content-between py-2">
                            <span class="text-secondary small">Registered Subjects:</span>
                            <div class="text-end" style="max-width: 250px;">
                                <span class="badge bg-secondary m-1" th:each="sub : ${app.appliedSubjects}" th:text="${sub.subjectCode}"></span>
                            </div>
                        </div>
                    </div>

                    <a href="/student-dashboard" class="btn btn-vtu-primary w-100 py-2">Go to Student Dashboard</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
