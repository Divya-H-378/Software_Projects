<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration - VTU Prexam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header Banner -->
    <header class="vtu-header-banner text-center">
        <div class="container">
            <div class="vtu-logo-text">🎓 VTU Prexam Portal</div>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="vtu-card">
                    <h3 class="vtu-card-title">Register Academic Profile</h3>
                    <p class="text-secondary small mb-4">Please fill in your academic detail parameters to register in the Prexam DB.</p>

                    <form th:action="@{/save-student}" th:object="${student}" method="post">
                        <div class="row g-3">
                            <!-- USN (Read-Only) -->
                            <div class="col-md-6">
                                <label class="form-label">University Seat Number (USN)</label>
                                <input type="text" th:field="*{usn}" class="form-control text-uppercase" required readonly>
                            </div>

                            <!-- Student Name -->
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Enter Full Name" required>
                            </div>

                            <!-- College Code Dropdown -->
                            <div class="col-md-6">
                                <label class="form-label">College Institution</label>
                                <select th:field="*{collegeCode}" class="form-select" required>
                                    <option value="" disabled selected>Select College</option>
                                    <option value="1MS">1MS - MS Ramaiah Institute of Technology</option>
                                    <option value="1BM">1BM - BMS College of Engineering</option>
                                    <option value="1RV">1RV - RV College of Engineering</option>
                                    <option value="1PE">1PE - PES Institute of Technology</option>
                                    <option value="1SG">1SG - Sapthagiri College of Engineering</option>
                                    <option value="1RR">1RR - RR Institute of Technology</option>
                                    <option value="1SK">1SK - Sri Krishna Institute of Technology</option>
                                    <option value="1RE">1RE - Reva University</option>
                                    <option value="1DS">1DS - Dayananda Sagar Institute of Technology</option>
                                </select>
                            </div>

                            <!-- Branch Dropdown -->
                            <div class="col-md-6">
                                <label class="form-label">Department / Branch</label>
                                <select th:field="*{branch}" class="form-select" required>
                                    <option value="" disabled selected>Select Branch</option>
                                    <option value="Computer Science">Computer Science & Engineering</option>
                                    <option value="Electronics & Communication">Electronics & Communication Engineering</option>
                                    <option value="Information Science">Information Science & Engineering</option>
                                    <option value="Electrical and Electronics">Electrical and Electronics Engineering</option>
                                    <option value="BioTechnology">BioTechnology Engineering</option>
                                    <option value="AI And Data Science">Artificial Intelligence & Data Science</option>
                                </select>
                            </div>

                            <!-- Semester (Active 3rd to 8th) -->
                            <div class="col-md-6">
                                <label class="form-label">Current Semester</label>
                                <select th:field="*{semester}" class="form-select" required>
                                    <option value="0" disabled selected>Select Semester</option>
                                    <option value="3">Semester 3</option>
                                    <option value="4">Semester 4</option>
                                    <option value="5">Semester 5</option>
                                    <option value="6">Semester 6</option>
                                    <option value="7">Semester 7</option>
                                    <option value="8">Semester 8</option>
                                </select>
                            </div>

                            <!-- Contact Number -->
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" th:field="*{phone}" class="form-control" placeholder="10-digit number" pattern="[0-9]{10}" required>
                            </div>

                            <!-- Email -->
                            <div class="col-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="name@college.edu" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4 pt-3 border-top">
                            <a href="/student-portal" class="btn btn-vtu-outline">Cancel</a>
                            <button type="submit" class="btn btn-vtu-primary">Register Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
