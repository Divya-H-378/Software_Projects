<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login - VTU Prexam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header Banner -->
    <header class="vtu-header-banner text-center">
        <div class="container">
            <div class="vtu-logo-text">🎓 VTU Prexam Portal</div>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="vtu-card">
                    <h3 class="vtu-card-title text-center">Student Portal Access</h3>
                    <p class="text-secondary text-center small mb-4">Enter your University Seat Number (USN) to enter your control panel.</p>

                    <!-- Errors alert -->
                    <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}"></div>

                    <form th:action="@{/student-login}" method="post">
                        <div class="mb-4">
                            <label for="usn" class="form-label">University Seat Number (USN)</label>
                            <input type="text" id="usn" name="usn" class="form-control text-uppercase" placeholder="e.g. 1MS21CS001" required autofocus>
                            <div class="form-text small mt-2">
                                Note: If your USN is not registered in the system database, you will be redirected to complete your profile form.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-vtu-primary w-100 py-2">Log In to Dashboard</button>
                    </form>

                    <div class="text-center mt-4 border-top pt-3">
                        <a href="/" class="text-decoration-none small" style="color: var(--vtu-navy); font-weight: 600;">← Back to Home Page</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
