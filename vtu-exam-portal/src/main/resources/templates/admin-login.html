<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coordinator Login - VTU Prexam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header Banner -->
    <header class="vtu-header-banner text-center">
        <div class="container">
            <div class="vtu-logo-text">🎓 VTU Administration Console</div>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="vtu-card">
                    <h3 class="vtu-card-title text-center">Coordinator Access</h3>
                    <p class="text-secondary text-center small mb-4">Enter authorization credentials to access the coordinator panel.</p>

                    <!-- Errors alert -->
                    <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}"></div>

                    <form th:action="@{/admin-login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="e.g. admin" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-vtu-primary w-100 py-2">Log In to Console</button>
                    </form>

                    <div class="text-center mt-4 border-top pt-3">
                        <a href="/" class="text-decoration-none small" style="color: var(--vtu-navy); font-weight: 600;">← Back to Home Page</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
