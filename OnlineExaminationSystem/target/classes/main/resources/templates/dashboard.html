<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="dashboard-container">
    <header class="dashboard-header">
        <h2>Welcome, <span th:text="${username}">Student</span></h2>
        <div>
            <a th:href="@{/my-results}" class="start-btn" style="margin-right:10px;">My Results</a>
            <a th:href="@{/logout}" class="logout-btn">Logout</a>
        </div>
    </header>

    <h3>Available Tests</h3>

    <div class="test-list">
        <div class="test-card" th:each="test : ${tests}">
            <div>
                <h4 th:text="${test.title}">Test Title</h4>
                <p th:text="'Duration: ' + ${test.duration} + ' mins'">Duration</p>
            </div>
            <a th:href="@{'/test/start/' + ${test.id}}" class="start-btn">Start Test</a>
        </div>

        <p th:if="${#lists.isEmpty(tests)}">No tests available right now.</p>
    </div>
</div>
</body>
</html>
